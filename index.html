        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

        const AGENT_ROLES = [

        function App() {
            const [documents, setDocuments] = useState([]);
            const [selectedDocId, setSelectedDocId] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard'); 
            
            const [viewerMode, setViewerMode] = useState('text'); 
            const [pdfInstance, setPdfInstance] = useState(null);
            const [pdfNumPages, setPdfNumPages] = useState(0);
            const [pdfCurrentPage, setPdfCurrentPage] = useState(1);
            const [pdfScale, setPdfScale] = useState(1.1);
            const [pdfLoading, setPdfLoading] = useState(false);
            const canvasRef = useRef(null);
            const renderTaskRef = useRef(null);

            const [showManualPaste, setShowManualPaste] = useState(false);
            const [manualCandidateName, setManualCandidateName] = useState('');
            const [manualCandidateDegree, setManualCandidateDegree] = useState('');
            const [manualCandidateText, setManualCandidateText] = useState('');
            const [manualEmail, setManualEmail] = useState('');
            const [manualPhone, setManualPhone] = useState('');

            const [chatMessages, setChatMessages] = useState([
                {
                    role: 'assistant',
                    content: 'Welcome to **YaqootLLM Professional Recruitment Workstation**. Import your candidate resume archives on the left sidebar to unlock direct multi-agent evaluations, grounded citation navigation, dynamic serial indexing, and high-fidelity skills-gap analyses.'
                }
            ]);
            
            const [inputValue, setInputValue] = useState('');
            const [customApiKey, setCustomApiKey] = useState('');
            const [selectedModel, setSelectedModel] = useState('gemini-2.5-flash');
            const [isApiKeyConnected, setIsApiKeyConnected] = useState(false);
            const [isParsing, setIsParsing] = useState(false);
            const [isGenerating, setIsGenerating] = useState(false);
            const [selectedForChat, setSelectedForChat] = useState({});
            const [showApiKey, setShowApiKey] = useState(false);
            const [pdfLibReady, setPdfLibReady] = useState(false);
            const [parsingProgress, setParsingProgress] = useState('');
            const [isDragging, setIsDragging] = useState(false);

            const [isLeftSidebarOpen, setIsLeftSidebarOpen] = useState(true);
            const [isRightSidebarOpen, setIsRightSidebarOpen] = useState(true);

            const [jdTitle, setJdTitle] = useState(JD_TEMPLATES[0].title);
            const [jdDescription, setJdDescription] = useState(JD_TEMPLATES[0].desc);
            const [jdSkills, setJdSkills] = useState(JD_TEMPLATES[0].skills);
            
            const [isAgentExecuting, setIsAgentExecuting] = useState(false);
            const [agentStepIndex, setAgentStepIndex] = useState(-1); 
            const [agentStepStatus, setAgentStepStatus] = useState({}); 
            const [collaborationDialog, setCollaborationDialog] = useState([]); 
            const [agentMemoryContext, setAgentMemoryContext] = useState({}); 
            const [finalReportOutput, setFinalReportOutput] = useState('');
            
            const [highlightedText, setHighlightedText] = useState(null);

            const chatEndRef = useRef(null);
            const dialogEndRef = useRef(null);
            const textContainerRef = useRef(null);

            useEffect(() => {
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js';
                script.async = true;
                script.onload = () => {
                    try {
                        fetch('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js')
                            .then(res => res.blob())
                            .then(blob => {
                                const blobUrl = URL.createObjectURL(blob);
                                window.pdfjsLib.GlobalWorkerOptions.workerSrc = blobUrl;
                                setPdfLibReady(true);
                            })
                            .catch(err => {
                                console.warn("Fallback default configuration initialized:", err);
                                window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
                                setPdfLibReady(true);
                            });
                    } catch (err) {
                        setPdfLibReady(true);
                    }
                };
                script.onerror = () => {
                    addNotificationMessage("PDF.js CDN library blocked. Operating with raw script inputs.");
                };
                document.body.appendChild(script);

                const savedKey = localStorage.getItem('yaqoot_custom_gemini_api_key');
                if (savedKey) {
                    setCustomApiKey(savedKey);
                    setIsApiKeyConnected(true);
                }
            }, []);

            useEffect(() => {
                const selectedDocObj = documents.find(d => d.id === selectedDocId);
                if (!selectedDocObj || !selectedDocObj.pdfBytes || viewerMode !== 'pdf') {
                    setPdfInstance(null);
                    setPdfNumPages(0);
                    return;
                }

                setPdfLoading(true);
                try {
                    const bytesClone = selectedDocObj.pdfBytes.slice(0);
                    const loadingTask = window.pdfjsLib.getDocument({ data: bytesClone });
                    loadingTask.promise.then(pdf => {
                        setPdfInstance(pdf);
                        setPdfNumPages(pdf.numPages);
                        setPdfCurrentPage(1);
                        setPdfLoading(false);
                    }).catch(err => {
                        setPdfLoading(false);
                    });
                } catch (e) {
                    setPdfLoading(false);
                }
            }, [selectedDocId, documents, viewerMode]);

            useEffect(() => {
                if (!pdfInstance || !canvasRef.current || viewerMode !== 'pdf') return;

                if (renderTaskRef.current) {
                    renderTaskRef.current.cancel();
                }

                pdfInstance.getPage(pdfCurrentPage).then(page => {
                    const canvas = canvasRef.current;
                    const context = canvas.getContext('2d');
                    const viewport = page.getViewport({ scale: pdfScale });

                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    const renderContext = {
                        canvasContext: context,
                        viewport: viewport
                    };

                    const renderTask = page.render(renderContext);
                    renderTaskRef.current = renderTask;

                    renderTask.promise.then(() => {
                        renderTaskRef.current = null;
                    }).catch(err => {
                        if (err.name !== 'RenderingCancelledException') {
                            console.error(err);
                        }
                    });
                }).catch(err => {});
            }, [pdfInstance, pdfCurrentPage, pdfScale, viewerMode]);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [chatMessages]);

            useEffect(() => {
                dialogEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [collaborationDialog]);

            const handleConnectCustomApiKey = async (e) => {
                e.preventDefault();
                if (!customApiKey.trim()) {
                    localStorage.removeItem('yaqoot_custom_gemini_api_key');
                    setIsApiKeyConnected(false);
                    addNotificationMessage("Custom API Key cleared. Operating in offline configuration simulation.");
                    return;
                }

                setParsingProgress('Connecting & validating Gemini runtime parameters...');
                setIsParsing(true);

                const testUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${customApiKey.trim()}`;
                const payload = { contents: [{ parts: [{ text: "Connection ping test" }] }] };

                try {
                    const res = await fetch(testUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (res.ok) {
                        localStorage.setItem('yaqoot_custom_gemini_api_key', customApiKey.trim());
                        setIsApiKeyConnected(true);
                        addNotificationMessage("Gemini API Key verified. High-fidelity multi-agent pipelines are active.");
                    } else {
                        throw new Error("Credentials invalid or blocked.");
                    }
                } catch (err) {
                    setIsApiKeyConnected(false);
                    addNotificationMessage(`Verification Fault: ${err.message}. Defaulting to sandbox simulation.`);
                } finally {
                    setIsParsing(false);
                    setParsingProgress('');
                }
            };

            const addNotificationMessage = (text) => {
                setChatMessages(prev => [...prev, { role: 'system', content: text }]);
            };

            const evaluateCandidateHeuristics = (text, title, desc, skills) => {
                const rawLower = text.toLowerCase();
                
                const skillAnalysis = skills.map(skill => {
                    const escaped = escapeRegExp(skill);
                    const regexStr = /^[a-zA-Z0-9]/.test(skill) && /[a-zA-Z0-9]$/.test(skill) ? `\\b${escaped}\\b` : escaped;
                    const regex = new RegExp(regexStr, 'i');
                    const hasSkill = regex.test(rawLower);
                    return {
                        name: skill,
                        found: hasSkill,
                        level: hasSkill ? Math.floor(Math.random() * 30) + 70 : 0 
                    };
                });

                const foundCount = skillAnalysis.filter(s => s.found).length;
                const skillsGapPercentage = Math.round(((skills.length - foundCount) / skills.length) * 100);

                const flags = [];
                if (rawLower.includes('gap') || rawLower.includes('career break')) {
                    flags.push("Detected mention of career gap or extended break.");
                }
                
                const dateMatches = text.match(/\b(20\d{2})\b/g);
                if (dateMatches && dateMatches.length > 4) {
                    const jobHoppingClue = dateMatches.some((val, index) => {
                        if (index === 0) return false;
                        return Math.abs(parseInt(val) - parseInt(dateMatches[index - 1])) <= 1;
                    });
                    if (jobHoppingClue) {
                        flags.push("Frequent transitional dates (potential short tenure/job-hopping).");
                    }
                }

                const hasDegree = /(ph\.?d|doctorate|master|b\.?sc|bachelor|degree)/i.test(rawLower);
                if (!hasDegree) {
                    flags.push("No explicit scientific or technological degree verified in text.");
                }

                if (flags.length === 0) {
                    flags.push("No clear chronological or stacking anomalies identified.");
                }

                const sentences = text.split(/[.!?]\s+/);
                const candidateCitations = [];
                
                skills.forEach(skill => {
                    const matchSentence = sentences.find(s => s.toLowerCase().includes(skill.toLowerCase()));
                    if (matchSentence && candidateCitations.length < 4) {
                        candidateCitations.push({
                            id: `cit-${Math.random().toString(36).substr(2, 5)}`,
                            topic: skill,
                            text: matchSentence.trim(),
                            page: Math.floor(Math.random() * 2) + 1
                        });
                    }
                });

                if (candidateCitations.length === 0 && sentences.length > 2) {
                    candidateCitations.push({
                        id: `cit-general`,
                        topic: "Profile Overview",
                        text: sentences[1].trim() + ".",
                        page: 1
                    });
                }

                const skillRatio = foundCount / skills.length;
                let baseScore = Math.floor(skillRatio * 60) + 35; 
                if (flags.length > 1 && flags[0] !== "No clear chronological or stacking anomalies identified.") {
                    baseScore -= 10;
                }
                const matchScore = Math.max(20, Math.min(99, baseScore + Math.floor(Math.random() * 5)));

                return { matchScore, skillsGapPercentage, skillAnalysis, flags, citations: candidateCitations };
            };

            const processFiles = async (files) => {
                setIsParsing(true);
                setParsingProgress('Opening workspace memory buffers...');

                for (const file of files) {
                    const isPdf = file.type === "application/pdf";
                    const isTxt = file.type === "text/plain" || file.name.endsWith('.txt') || file.name.endsWith('.md');

                    if (!isPdf && !isTxt) {
                        addNotificationMessage("File format rejected. Standard text or PDF structures only.");
                        continue;
                    }

                    try {
                        let textContent = "";
                        let typedarray = null;

                        if (isPdf) {
                            setParsingProgress(`Ingesting PDF structure: ${file.name}...`);
                            const fileReader = new FileReader();
                            
                            const extractedResult = await new Promise((resolve, reject) => {
                                fileReader.onload = async (event) => {
                                    const resultBytes = new Uint8Array(event.target.result);
                                    if (!window.pdfjsLib) {
                                        reject(new Error("PDF module runtime engine uninitialized."));
                                        return;
                                    }

                                    try {
                                        const renderingBufferCopy = resultBytes.slice(0);
                                        const pdf = await window.pdfjsLib.getDocument({ data: renderingBufferCopy }).promise;
                                        let textAccumulator = "";
                                        const maxPages = Math.min(pdf.numPages, 10);
                                        
                                        for (let pageNum = 1; pageNum <= maxPages; pageNum++) {
                                            setParsingProgress(`Parsing textual vectors: page ${pageNum}/${pdf.numPages}...`);
                                            const page = await pdf.getPage(pageNum);
                                            const textObj = await page.getTextContent();
                                            const pageText = textObj.items.map(item => item.str).join(" ");
                                            textAccumulator += `--- Page ${pageNum} ---\n` + pageText + "\n\n";
                                        }
                                        resolve({ text: textAccumulator, bytes: resultBytes });
                                    } catch (err) {
                                        reject(err);
                                    }
                                };
                                fileReader.onerror = () => reject(new Error("Failed to read raw file binaries."));
                                fileReader.readAsArrayBuffer(file);
                            });

                            textContent = extractedResult.text;
                            typedarray = extractedResult.bytes;
                        } else {
                            setParsingProgress(`Reading ASCII Stream: ${file.name}...`);
                            const fileReader = new FileReader();
                            textContent = await new Promise((resolve, reject) => {
                                fileReader.onload = (event) => resolve(event.target.result);
                                fileReader.onerror = () => reject(new Error("Failed to parse plaintext lines."));
                                fileReader.readAsText(file);
                            });
                        }

                        const fileUrl = isPdf ? URL.createObjectURL(file) : null;

                } else if (stepIdx === 2) {

                    prompt = `You are the Interview Preparation Agent. Formulate customized tech interview questions. Reference the candidates by Name and Serial index. Previous context:\n${previousContext}`;

                const url = `https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${customApiKey}`;
                const payload = {
                    contents: [{ parts: [{ text: `Docs:\n${rawDocsData}\n\nTask Instructions:\n${prompt}` }] }],

                try {
                    const res = await fetch(url, {

            const simulateLocalAgentExecution = (stepIdx, selectedDocs) => {

                        analysis += `- **Skills Found**: ${d.evaluation.skillAnalysis.filter(s => s.found).map(s => s.name).join(', ') || 'None'}\n`;

                            <div className="p-4 border-b border-[#DCDCD0] bg-[#EDEDE4] space-y-3">
                                <span className="text-[11px] font-mono font-bold text-slate-700 uppercase tracking-wider block">INGEST RESUMES</span>
                                <div
                                    onDragOver={handleDragOverArea}
                                    onDragLeave={handleDragLeaveArea}
                                    onDrop={handleDropArea}
                                    className={`border-2 border-dashed rounded-lg p-4 flex flex-col items-center justify-center cursor-pointer transition-all text-center relative ${
                                        isDragging ? 'border-[#800000] bg-red-50/50 scale-95' : 'border-[#B8B8A8] bg-[#FDFDFB]'
                                    }`}
                                >
                                    <input type="file" multiple accept=".pdf,.txt,.text,.md" onChange={handleFileUploadInput} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                                    <Upload />
                                    <span class="text-xs font-bold text-slate-800 mt-1">{isDragging ? "Release Files Now" : "Drag & Drop Portfolios"}</span>
                                    <span class="text-[10px] text-[#800000] font-medium mt-0.5">or click to map browse targets</span>
                                </div>

                                <button onClick={() => setShowManualPaste(!showManualPaste)} className="w-full py-1.5 px-3 border border-[#B8B8A8] bg-[#FDFDFB] rounded text-xs font-mono font-medium text-slate-700 flex items-center justify-center space-x-1.5">
                                    <Edit size={13} className="text-[#800000]" />
                                    <span>{showManualPaste ? "Hide Editor Block" : "Paste Manual Resume Text"}</span>
                                </button>

                                {showManualPaste && (
                                    <form onSubmit={handleSaveManualPaste} className="bg-white border border-[#C0C0B0] rounded-md p-3 space-y-2 shadow-sm">
                                        <input type="text" placeholder="Candidate Full Name" required value={manualCandidateName} onChange={(e) => setManualCandidateName(e.target.value)} className="w-full text-xs px-2 py-1 rounded border font-mono" />
                                        <input type="text" placeholder="Degree (M.Sc / Ph.D)" value={manualCandidateDegree} onChange={(e) => setManualCandidateDegree(e.target.value)} className="w-full text-xs px-2 py-1 rounded border font-mono" />
                                        <div className="grid grid-cols-2 gap-1">
                                            <input type="email" placeholder="Email" value={manualEmail} onChange={(e) => setManualEmail(e.target.value)} className="w-full text-xs px-2 py-1 rounded border font-mono" />
                                            <input type="text" placeholder="Mobile" value={manualPhone} onChange={(e) => setManualPhone(e.target.value)} className="w-full text-xs px-2 py-1 rounded border font-mono" />
                                        </div>
                                        <textarea required rows={3} placeholder="Paste resume payload contents..." value={manualCandidateText} onChange={(e) => setManualCandidateText(e.target.value)} className="w-full text-xs px-2 py-1 rounded border font-mono resize-none" />
                                        <button type="submit" className="w-full py-1 bg-[#800000] text-white rounded text-xs font-mono font-bold">Ingest Data</button>
                                    </form>
                                )}
                            </div>

                            <div className="p-3 border-b border-[#DCDCD0] bg-[#F5F5EC] flex items-center justify-between text-xs font-mono">
                                <span className="font-bold text-slate-600">Active Pool ({documents.length})</span>
                                {documents.length > 0 && (
                                    <div className="flex space-x-2">
                                        <button onClick={handleSelectAll} className="text-[#800000] hover:underline">All</button>
                                        <span className="text-slate-300">|</span>
                                        <button onClick={handleClearAll} className="text-slate-600 hover:underline">None</button>
                                    </div>
                                )}
                            </div>

                            {/* PORTFOLIO ACCORDION LINE CARDS LIST */}
                            <div className="flex-grow overflow-y-auto p-2 space-y-2">
                                {documents.length === 0 ? (
                                    <div className="p-6 border border-dashed border-[#C0C0B0] rounded-lg text-center text-slate-400 text-xs mt-2">
                                        <FileText className="mx-auto mb-1 opacity-25" size={28} />
                                        <p class="font-medium text-slate-600">No Custom CVs Ingested.</p>
                                    </div>
                                ) : (
                                    documents.map((doc) => {
                                        const isActive = doc.id === selectedDocId;
                                        const isChecked = !!selectedForChat[doc.id];
                                        return (
                                            <div key={doc.id} onClick={() => setSelectedDocId(doc.id)} className={`p-2.5 rounded border flex items-start space-x-2 cursor-pointer transition-all ${isActive ? 'bg-white border-[#800000] shadow-sm' : 'bg-[#EDEDE4]/50 border-[#DCDCD0]'}`}>
                                                <div onClick={(e) => toggleDocInContext(doc.id, e)} className={`w-4 h-4 rounded border mt-0.5 flex items-center justify-center flex-shrink-0 ${isChecked ? 'bg-[#800000] border-[#800000] text-white' : 'border-slate-400'}`}>
                                                    {isChecked && <Check size={11} strokeWidth={3} />}
                                                </div>
                                                <div className="flex-1 min-w-0">
                                                    <div className="flex items-center justify-between">
                                                        <span className="text-[10px] font-mono text-[#800000] font-bold truncate max-w-[80%]">{doc.serialNum}: {doc.author}</span>
                                                        <span className="text-[9px] font-mono font-bold px-1 rounded bg-slate-100">{doc.evaluation.matchScore}%</span>
                                                    </div>
                                                    <div className="text-[9px] font-mono text-slate-500 mt-1 truncate">📧 {doc.email}</div>
                                                    <div className="text-[9px] font-mono text-slate-500 truncate">📞 {doc.phone}</div>
                                                </div>
                                                <button onClick={(e) => handleDeletePortfolio(doc.id, e)} className="text-slate-400 hover:text-[#800000] p-0.5"><Trash2 size={13} /></button>
                                            </div>
                                        );
                                    })
                                )}
                            </div>
                        </aside>

                        {/* SUBSECTOR B: CENTRAL CONTROL PRESENTATION STAGE */}
                        <main className="flex-grow flex flex-col h-full overflow-hidden bg-slate-100 min-w-0 relative">
                            <div className="bg-[#EDEDE4] border-b border-[#DCDCD0] px-4 py-2 flex items-center justify-between flex-shrink-0">
                                <div className="flex gap-2 overflow-x-auto no-scrollbar whitespace-nowrap">
                                    <button onClick={() => setActiveTab('dashboard')} className={`px-3 py-1.5 rounded text-xs flex items-center space-x-1.5 ${activeTab === 'dashboard' ? 'bg-white font-bold border' : 'text-slate-600'}`}>
                                        <BarChart2 size={12} className="text-[#800000]" /><span>Leaderboard</span>
                                    </button>
                                    <button onClick={() => { if(!selectedDocId) return; setActiveTab('preview'); }} className={`px-3 py-1.5 rounded text-xs flex items-center space-x-1.5 ${activeTab === 'preview' ? 'bg-white font-bold border' : 'text-slate-600'}`}>
                                        <BookOpen size={12} className="text-[#800000]" /><span>Grounded Doc Viewer</span>
                                    </button>
                                    <button onClick={() => setActiveTab('cockpit')} className={`px-3 py-1.5 rounded text-xs flex items-center space-x-1.5 ${activeTab === 'cockpit' ? 'bg-white font-bold border' : 'text-slate-600'}`}>
                                        <Cpu size={12} className="text-[#800000]" /><span>Agent Cockpit</span>
                                    </button>
                                    <button onClick={() => { if(!finalReportOutput) return; setActiveTab('report'); }} className={`px-3 py-1.5 rounded text-xs flex items-center space-x-1.5 ${activeTab === 'report' ? 'bg-white font-bold border' : 'text-slate-600'}`}>
                                        <Award size={12} className="text-[#800000]" /><span>Strategic Report</span>
                                    </button>
                                </div>
                            </div>

                            <div className="flex-grow overflow-hidden relative min-h-0 min-w-0">
                                {activeTab === 'dashboard' ? (
                                    <div class="h-full bg-[#FAF9F5] p-6 overflow-y-auto space-y-6">
                                        {/* Configuration Job Description Brief Module */}
                                        <div className="bg-white p-5 rounded-lg border border-[#DCDCD0] shadow-sm space-y-3">
                                            <div className="flex flex-wrap justify-between items-center border-b pb-2 gap-2">
                                                <h3 class="text-sm font-serif font-bold text-slate-800">Target Requirements Selection Matrix</h3>
                                                <div className="flex gap-1">
                                                    {JD_TEMPLATES.map((tmpl, idx) => (
                                                        <button key={idx} onClick={() => handleSelectJdTemplate(tmpl)} className={`text-[10px] font-mono px-2 py-0.5 rounded border ${jdTitle === tmpl.title ? 'bg-[#800000] text-white' : 'bg-slate-50'}`}>{tmpl.title}</button>
                                                    ))}
                                                </div>
                                            </div>
                                            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                                                <div className="space-y-2">
                                                    <input type="text" value={jdTitle} onChange={(e) => handleManualJdChange('title', e.target.value)} className="w-full text-xs px-2 py-1.5 border font-mono rounded" />
                                                    <input type="text" value={jdSkills.join(', ')} onChange={(e) => handleManualJdChange('skills', e.target.value)} className="w-full text-xs px-2 py-1.5 border font-mono rounded" />
                                                </div>
                                                <div class="md:col-span-2">
                                                    <textarea rows={3} value={jdDescription} onChange={(e) => handleManualJdChange('desc', e.target.value)} className="w-full text-xs px-2 py-1.5 border font-mono rounded resize-none" />
                                                </div>
                                            </div>
                                        </div>

                                        {/* Dynamic Core Table Leaderboard view */}
                                        <div class="bg-white p-5 rounded-lg border border-[#DCDCD0] shadow-sm">
                                            <h3 class="text-sm font-serif font-bold text-slate-800 border-b pb-2 mb-3">Dynamic Recruitment Rankings Portfolio</h3>
                                            {documents.length === 0 ? (
                                                <div class="p-6 text-center text-slate-400 font-mono text-xs">No portfolios uploaded to compile matrix outputs.</div>
                                            ) : (
                                                <div className="overflow-x-auto">
                                                    <table className="w-full text-left text-xs border-collapse">
                                                        <thead>
                                                            <tr className="bg-slate-50 border-b font-mono text-[10px] text-slate-500">
                                                                <th class="p-2">Rank</th>
                                                                <th class="p-2">Identity Details (Serial, Name, Email, Mobile)</th>
                                                                <th class="p-2">Standard</th>
                                                                <th class="p-2 text-center">Gaps Matrix</th>
                                                                <th class="p-2 text-center">Fit Score</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody>
                                                            {leaderboardCandidates.map((cand, idx) => (
                                                                <tr key={cand.id} onClick={() => setSelectedDocId(cand.id)} className={`border-b hover:bg-slate-50 cursor-pointer ${selectedDocId === cand.id ? 'bg-slate-50 font-semibold' : ''}`}>
                                                                    <td className="p-2 font-mono text-slate-400">0{idx + 1}</td>
                                                                    <td className="p-2">
                                                                        <div className="text-slate-900 font-medium">[{cand.serialNum}] {cand.author}</div>
                                                                        <div class="text-[10px] font-mono text-slate-400">📧 {cand.email} | 📞 {cand.phone}</div>
                                                                    </td>
                                                                    <td class="p-2 text-slate-600">{cand.metadata.degree}</td>
                                                                    <td class="p-2 text-center font-mono">{cand.evaluation.skillsGapPercentage}%</td>
                                                                    <td class="p-2 text-center font-bold text-[#800000] font-mono">{cand.evaluation.matchScore}%</td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                ) : activeTab === 'preview' ? (
                                    <div class="h-full flex flex-col md:flex-row bg-[#EDEDE4]">
                                        <div class="flex-grow md:w-2/3 bg-[#FAF9F5] overflow-y-auto p-6 flex flex-col">
                                            <div class="bg-white p-6 border rounded shadow-sm flex-grow font-mono text-xs whitespace-pre-wrap leading-relaxed">
                                                <div className="border-b-2 pb-2 mb-3">
                                                    <h3 className="text-sm font-bold text-slate-900">[{selectedDocObj?.serialNum}] {selectedDocObj?.author}</h3>
                                                    <p className="text-[10px] text-slate-500 mt-0.5">Contact parameters: ${selectedDocObj?.email} | ${selectedDocObj?.phone}</p>
                                                </div>
                                                {highlightedText ? (
                                                    (() => {
                                                        const parts = selectedDocObj?.extractedText.split(highlightedText);
                                                        if (parts && parts.length > 1) {
                                                            return (
                                                                <>
                                                                    {parts[0]}
                                                                    <mark class="bg-[#FFF3CD] text-[#800000] border-b-2 border-[#800000] font-bold p-0.5">{highlightedText}</mark>
                                                                    {parts.slice(1).join(highlightedText)}
                                                                </>
                                                            );
                                                        }
                                                        return selectedDocObj?.extractedText;
                                                    })()
                                                ) : selectedDocObj?.extractedText}
                                            </div>
                                        </div>
                                        <div class="w-80 bg-white p-4 border-l overflow-y-auto space-y-3 flex-shrink-0">
                                            <span class="text-xs font-mono font-bold block border-b pb-1">Claim Anchor Points</span>
                                            {selectedDocObj?.evaluation.citations.map((cit) => (
                                                <div key={cit.id} onClick={() => setHighlightedText(cit.text)} className={`p-2 rounded border text-[11px] cursor-pointer ${highlightedText === cit.text ? 'bg-amber-50 border-amber-400' : 'bg-slate-50'}`}>
                                                    <div class="flex justify-between text-[9px] text-slate-400 font-mono"><span>{cit.topic}</span><span>Page {cit.page}</span></div>
                                                    <p class="italic text-slate-700 mt-1">"{cit.text}"</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ) : activeTab === 'cockpit' ? (
                                    <div class="h-full bg-[#F4F4EE] flex flex-col">
                                        <div class="bg-white p-4 border-b flex justify-between items-center flex-shrink-0 shadow-xs">
                                            <span class="text-xs font-mono font-bold text-slate-600">ReAct Chain Orchestration Node</span>
                                            <button onClick={runCollaborativeWorkflow} disabled={isAgentExecuting} className="px-4 py-2 bg-[#800000] text-white text-xs font-mono font-bold rounded hover:bg-stone-900 transition disabled:opacity-40">
                                                {isAgentExecuting ? "Processing Context Matrix..." : "Run Agent Collaboration"}
                                            </button>
                                        </div>
                                        <div class="flex-grow flex flex-col md:flex-row min-h-0 overflow-hidden p-4 gap-4">
                                            <div class="flex-grow bg-white border rounded-xl flex flex-col overflow-hidden">
                                                <span class="bg-slate-50 px-3 py-2 border-b text-[10px] font-mono font-bold block">Consensus Conversation Feed</span>
                                                <div class="flex-grow p-4 overflow-y-auto space-y-3 bg-[#FAF9F5]">
                                                    {collaborationDialog.map((dialog, idx) => (
                                                        <div key={idx} className="bg-white border rounded-lg p-3 text-xs leading-relaxed shadow-xs">
                                                            <div class="flex justify-between border-b pb-1 mb-1 text-[9px] font-mono text-slate-400">
                                                                <span class="font-bold text-[#800000]">{dialog.author}</span><span>{dialog.timestamp}</span>
                                                            </div>
                                                            <p class="text-slate-700 font-sans whitespace-pre-wrap">{dialog.message}</p>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    <div class="h-full bg-white p-6 overflow-y-auto">
                                        <div class="max-w-2xl mx-auto border-t-4 border-[#800000] pt-4 space-y-4">
                                            <div class="text-xs font-mono leading-relaxed bg-[#FAF9F5] p-6 border rounded-md whitespace-pre-wrap select-all font-bold text-slate-800">
                                                {finalReportOutput}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </main>

                        {/* RIGHT ACCORDION COLLAPSIBLE SIDEBAR TOGGLE */}
                        <button
                            onClick={() => setIsRightSidebarOpen(!isRightSidebarOpen)}
                            style={{ right: isRightSidebarOpen ? '384px' : '0px' }}
                            className="absolute top-1/2 transform -translate-y-1/2 translate-x-1/2 z-20 bg-white border border-[#DCDCD0] hover:border-[#800000] p-1 rounded shadow-md transition-all text-[#800000]"
                        >
                            <ChevronRight size={14} className={`transform transition-transform ${isRightSidebarOpen ? 'rotate-0' : 'rotate-180'}`} />
                        </button>

                        {/* SUBSECTOR C: RIGHT PROFESSIONAL COMPANION PANEL */}
                        <aside className={`${isRightSidebarOpen ? 'w-96' : 'w-0 border-l-0'} border-l border-[#DCDCD0] bg-white flex flex-col overflow-hidden flex-shrink-0 relative transition-all duration-300`}>
                            <div class="bg-[#EDEDE4] border-b p-3 flex flex-shrink-0 flex-col gap-1">
                                <span class="font-bold text-xs font-sans text-slate-700">CV Intelligence Panel</span>
                                <span class="text-[10px] text-[#800000] font-mono">Dynamic LLM Recruitment Console</span>
                            </div>

                            <div class="flex-1 p-4 overflow-y-auto space-y-4 bg-[#FDFDFB] relative">
                                {!isApiKeyConnected && (
                                    <div class="absolute inset-0 bg-white/95 backdrop-blur-xs z-30 flex flex-col items-center justify-center p-6 text-center">
                                        <h4 class="text-xs font-bold text-slate-800 uppercase tracking-wide mb-1">Analytical Pipeline Locked</h4>
                                        <p class="text-[11px] text-slate-500 leading-normal max-w-xs mb-3">Please connect your private Google Gemini API Key in the upper control header taskbar to unlock custom queries.</p>
                                    </div>
                                )}

                                {chatMessages.map((msg, idx) => (
                                    <div key={idx} class={`flex flex-col ${msg.role === 'user' ? 'items-end' : 'items-start'}`}>
                                        <span class="text-[9px] font-mono text-slate-400 mb-0.5">{msg.role === 'user' ? 'You' : 'Agent'}</span>
                                        <div className={`p-2.5 rounded-lg text-xs max-w-[85%] leading-relaxed shadow-xs ${msg.role === 'user' ? 'bg-[#800000] text-white' : 'bg-[#F4F4EE] text-slate-900 border'}`}>
                                            {msg.content}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {/* TOOLBELT PRESET UTILITIES SECTOR */}
                            <div class="p-2 border-t bg-[#F4F4EE] flex-shrink-0">
                                <span class="text-[9px] font-mono font-bold text-slate-500 uppercase tracking-widest block mb-1.5 px-1">Candidate Intelligence Toolbelt</span>
                                <div class="grid grid-cols-2 gap-1 text-[10px]">
                                    <button onClick={() => applyActionPreset("Summarize the target credentials, core focus stacks, and accomplishments of the active portfolios. Explicitly print out each Candidate's Serial number, Email, and Mobile access phone records at the start of the summary block.")} class="p-1.5 bg-white border rounded text-left font-sans font-medium text-stone-700 hover:bg-[#800000] hover:text-white truncate">📝 Summarize Portfolios</button>
                                    <button onClick={() => applyActionPreset("Perform a comprehensive side-by-side technical cross-comparison of all active candidates. Map out full Name, Email, Mobile and overall alignment parameters in a clear structural brief.")} class="p-1.5 bg-white border rounded text-left font-sans font-medium text-stone-700 hover:bg-[#800000] hover:text-white truncate">📊 Run Cross-Comparison</button>
                                    <button onClick={() => applyActionPreset("Based on target framework matching rules, evaluate who stands out as the primary recommendation choice. Explicitly output their winner Name, email, and mobile phone contacts.")} class="p-1.5 bg-white border rounded text-left font-sans font-medium text-stone-700 hover:bg-[#800000] hover:text-white truncate">🏆 Recommendation Analysis</button>
                                    <button onClick={() => applyActionPreset("Orchestrate targeted scenario tech interview templates probing competency gaps for each loaded candidate portfolio. Explicitly map each custom guide directly under Candidate Name, Email, and Mobile fields.")} class="p-1.5 bg-white border rounded text-left font-sans font-medium text-stone-700 hover:bg-[#800000] hover:text-white truncate">🎯 Interview Engineering</button>
                                </div>
                            </div>

                            <form onSubmit={handleSendChatText} class="p-2 border-t bg-[#EDEDE4] flex flex-shrink-0 space-x-1">
                                <input type="text" placeholder={isApiKeyConnected ? "Query loaded candidates..." : "Awaiting API validation..."} disabled={!isApiKeyConnected} value={inputValue} onChange={(e) => setInputValue(e.target.value)} class="flex-1 text-xs px-2 py-1.5 rounded border focus:outline-none" />
                                <button type="submit" disabled={!isApiKeyConnected} class="bg-[#800000] text-white text-xs px-3 font-bold rounded">Ask</button>
                            </form>
                        </aside>

                    </div>
                </div>
            );
        }

        // Virtual DOM Mount Execution
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
